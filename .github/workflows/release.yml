name: release

on:
  push:
    tags: ["v*"]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # required to attach assets to the release
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Verify tag matches manifest.version
        run: |
          TAG="${GITHUB_REF##*/}"               # e.g. v1.0.0
          TAG_VERSION="${TAG#v}"                # → 1.0.0
          MANIFEST_VERSION=$(python -c "import json; print(json.load(open('manifest.json'))['version'])")
          if [ "$TAG_VERSION" != "$MANIFEST_VERSION" ]; then
            echo "::error::tag $TAG ($TAG_VERSION) does not match manifest.version $MANIFEST_VERSION"
            exit 1
          fi
          echo "tag $TAG matches manifest.version $MANIFEST_VERSION ✓"

      - name: Validate
        run: python scripts/validate_plugin.py .

      - name: Test
        run: python -m pytest -q

      - name: Build upload zip
        run: python scripts/build_release.py --output dist/

      - name: Attach to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.zip
          generate_release_notes: true
